services:
  api:
    image: ghcr.io/${IMAGE_OWNER}/lexone-api:${IMAGE_TAG:-latest}
    container_name: lexone-api
    restart: unless-stopped
    env_file:
      - ./.env.api
    ports:
      - "3000:3000"
      - "8081:8081"
    volumes:
      - api_documents:/app/src/public/documents

  web:
    image: ghcr.io/${IMAGE_OWNER}/lexone-web:${IMAGE_TAG:-latest}
    container_name: lexone-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  api_documents:

name: Deploy Web & API to EC2

on:
  push:
    branches: [main]
    paths:
      - 'web_src/**'
      - 'node_api/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./node_api
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_API }}:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web_src
          push: true
          build-args: |
            REACT_APP_NODE_ENV=production
            REACT_APP_MOCK_AUTH=false
            REACT_APP_BASE_URL=https://api.lex-one.online
            REACT_APP_SOCKET_URL=https://ws.lex-one.online
            REACT_APP_MEDIA_URL=https://api.lex-one.online
            REACT_APP_FRONT_BASE_URL=https://lex-one.online
            REACT_APP_GOOGLE_MAP_API_KEY=${{ secrets.REACT_APP_GOOGLE_MAP_API_KEY }}
            REACT_APP_FIREBASE_API_KEY=${{ secrets.REACT_APP_FIREBASE_API_KEY }}
            REACT_APP_FIREBASE_AUTHDOMAIN=${{ secrets.REACT_APP_FIREBASE_AUTHDOMAIN }}
            REACT_APP_FIREBASE_DBURL=${{ secrets.REACT_APP_FIREBASE_DBURL }}
            REACT_APP_FIREBASE_PROID=${{ secrets.REACT_APP_FIREBASE_PROID }}
            REACT_APP_FIREBASE_STORAGE_BUCKET=${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
            REACT_APP_FIREBASE_MSG_SENDID=${{ secrets.REACT_APP_FIREBASE_MSG_SENDID }}
            REACT_APP_FIREBASE_APP_ID=${{ secrets.REACT_APP_FIREBASE_APP_ID }}
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_WEB }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: "deploy/lexone-api/docker-compose.yml,deploy/lexone-web/docker-compose.yml"
          target: "/tmp/lexone-deploy"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            mkdir -p /home/ubuntu/apps/lexone-api /home/ubuntu/apps/lexone-web
            mv /tmp/lexone-deploy/lexone-api/docker-compose.yml /home/ubuntu/apps/lexone-api/docker-compose.yml
            mv /tmp/lexone-deploy/lexone-web/docker-compose.yml /home/ubuntu/apps/lexone-web/docker-compose.yml
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            cd /home/ubuntu/apps/lexone-api
            IMAGE_URI=${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_API }}:latest docker compose pull
            IMAGE_URI=${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_API }}:latest docker compose up -d

            cd /home/ubuntu/apps/lexone-web
            IMAGE_URI=${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_WEB }}:latest docker compose pull
            IMAGE_URI=${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY_WEB }}:latest docker compose up -d

            docker image prune -f
